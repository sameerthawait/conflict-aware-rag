app = "rag-system-api"
primary_region = "sea"

[build]
  dockerfile = "../Dockerfile"

[env]
  CHROMA_HOST = "chromadb.internal"
  CHROMA_PORT = "8000"
  LOG_LEVEL = "INFO"

[[mounts]]
  source = "rag_data"
  destination = "/app/data"
  initial_size = "10GB"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 35

  [[services.http_checks]]
    interval = "15s"
    grace_period = "10s"
    method = "get"
    path = "/health/ready"
    protocol = "http"
    timeout = "3s"
    tls_skip_verify = false
    [services.http_checks.headers]
      Accept = "application/json"
