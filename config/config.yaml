# RAG System Configuration Settings

system:
  log_level: "INFO"

chunking:
  min_tokens: 50
  max_tokens: 500
  target_tokens: 300
  overlap_tokens: 100

embeddings:
  model_name: "sentence-transformers/all-mpnet-base-v2"
  batch_size: 128
  device: "cuda"

vector_store:
  persist_directory: "${CHROMA_DB_PATH:-./data/chroma_db}"
  collection_name: "rag_documents"

llm:
  model_name: "meta/llama-3.3-70b-instruct"
  base_url: "https://integrate.api.nvidia.com/v1"
  temperature: 0.0
  max_tokens_to_sample: 1024

retrieval:
  vector_weight: 0.7
  bm25_weight: 0.3
  vector_top_k: 10
  bm25_top_k: 10
  final_top_k: 5
  reranker: "cross-encoder"  # cross-encoder | llm | none
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  reranker_min_score: 0.0
  fusion_method: "rrf"
  rrf_k: 60
  bm25_index_path: "data/bm25_index.pkl"

quality_gates:
  preflight_min_verdict: "PARTIAL" # SUFFICIENT | PARTIAL | INSUFFICIENT (SUFFICIENT/PARTIAL will proceed, INSUFFICIENT blocks)
  enable_hallucination_verifier: true
  refusal_message: "I am sorry, but I could not find any relevant information in the provided context to answer your query."

evaluation:
  golden_dataset_path: "data/golden_dataset/qa_pairs.json"
  results_output_path: "data/evaluation_results"
  thresholds:
    overall_score: 3.8
    faithfulness: 4.0
    correctness: 3.5
    completeness: 3.5
    citation_quality: 4.0
    refusal_accuracy: 0.9

security:
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "https://myragapp.com"
  request_size_limit_kb: 10
  max_query_length: 500
  # Default keys hashed using SHA-256. Values here are hashes of:
  # - admin-secret-key-123 (Tier: premium)
  # - standard-secret-key-456 (Tier: standard)
  hashed_api_keys:
    "1538a8a63f4c207742855342193598fa81e832ebe1947d7fd03aaa85d74de0e3":
      name: "admin-key"
      tier: "premium"
      rate_limit_rpm: 100
      token_limit_tpd: 1000000
    "fb65eda85a165f0d3dd1e14b7a6103e37499208cc4ef155551d9fb424e781021":
      name: "env-admin-key"
      tier: "premium"
      rate_limit_rpm: 100
      token_limit_tpd: 1000000
    "9d2684771c283686b0f916bf9e767caa0f80d8e25d33a72111289855eeb20d3c":
      name: "standard-key"
      tier: "standard"
      rate_limit_rpm: 20
      token_limit_tpd: 100000
    "6609d0da0d68b07be55d4cb61874134abdc2e28f6460fbb1e73f2550f7f1ccfd":
      name: "env-standard-key"
      tier: "standard"
      rate_limit_rpm: 20
      token_limit_tpd: 100000

redis:
  url: "redis://localhost:6379/0"
  enabled: true

cache:
  cosine_threshold: 0.95
  ttl_seconds: 3600

concurrency:
  max_concurrent_queries: 20
  queue_depth_limit: 50

costs:
  pricing:
    # Model pricing in USD per 1M tokens
    prompt_tokens_per_million: 3.00
    completion_tokens_per_million: 15.00
  budgets:
    daily_token_budget: 500000
    monthly_token_budget: 10000000

vector_store_pool:
  size: 10

multiperspective:
  contradiction_confidence_threshold: 0.7
  disagreement_score_trigger: 3
  max_perspectives: 4
  embedding_similarity_min: 0.3
  embedding_similarity_max: 0.95

ca_rag:
  claim_confidence_threshold: 0.6
  nli_model_name: "cross-encoder/nli-deberta-v3-base"
  fallback_nli_model_name: "facebook/bart-large-mnli"
  nli_similarity_min: 0.25
  contradiction_threshold: 0.55
  cluster_similarity_threshold: 0.85
  max_clusters: 6
  min_claims_for_carag: 3
  contradiction_density_threshold: 0.1
  neo4j_uri: "bolt://localhost:7687"
  neo4j_user: "neo4j"
  neo4j_password: "password"
  domain_decay_rates:
    ai_ml: 1.3
    data_science: 1.1
    cloud: 1.2
    devops: 1.2
    ar_vr: 1.4
    medical: 0.7
    legal: 0.7
    historical: 0.3
    general: 1.0
  timeouts:
    claim_extraction_ms: 2000
    nli_classification_ms: 1500
    clustering_ms: 500
    graph_building_ms: 300
    synthesis_ms: 3000
