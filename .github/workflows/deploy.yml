name: Production Deploy CI/CD Release Pipeline

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  preflight-verify:
    name: Run Preflight Deployment Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Hugging Face Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-huggingface-

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov

      - name: Run Ruff Lint check
        run: ruff check src/

      - name: Run Mypy Type check
        run: mypy src/ --ignore-missing-imports

      - name: Setup Mock Database Data dirs
        run: mkdir -p data/chroma data/evaluation_results

      - name: Run deploy.sh Preflight Verification
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          REDIS_URL: redis://localhost:6379/0
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh dry-run

  security-scan:
    name: Run Security Vulnerability Scanning
    needs: preflight-verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Scan Python dependencies
        run: |
          pip install safety pip-audit
          safety check -r requirements.txt
          pip-audit -r requirements.txt

      - name: Scan Docker image
        run: |
          docker build -t rag-system .
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image rag-system --exit-code 1 --severity HIGH,CRITICAL

      - name: Block deploy on critical CVE
        if: failure()
        run: |
          echo "SECURITY SCAN FAILED - Deploy blocked"
          exit 1

  docker-build-and-push:
    name: Build & Push Docker Container Release
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/rag-system-api:latest
            ghcr.io/${{ github.repository }}/rag-system-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
