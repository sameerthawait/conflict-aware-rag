groups:
  - name: RAGAlertRules
    rules:
      - alert: HighErrorRate
        expr: (sum(rate(rag_requests_total{status="error"}[5m])) / sum(rate(rag_requests_total[5m]))) * 100 > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High API Error Rate"
          description: "RAG system API error rate is {{ $value }}%, which exceeds the 5% threshold."

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(rag_request_duration_seconds_bucket[5m])) by (le)) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High Request Latency (P95)"
          description: "95% of requests are taking longer than {{ $value }}s to complete."

      - alert: CircuitBreakerOpen
        expr: rag_circuit_breaker_state == 1
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "LLM Circuit Breaker Open"
          description: "LLM client circuit breaker is OPEN due to downstream failure or rate limits."

      - alert: BudgetWarning
        expr: sum(rag_llm_tokens_used) > 400000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Daily Token Budget Close to Exhaustion"
          description: "Total tokens consumed is {{ $value }}, which exceeds 80% of daily budget limit (500000)."

      - alert: QueueFull
        expr: rag_queue_depth > 40
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Request Queue depth is high"
          description: "API request concurrency queue depth is {{ $value }}, close to maximum buffer size."
